---
title: 全部文章
layout: default
navbar_active: pages
---

<div class="page-bg border border-gray-400 rounded-sm">
  <div class="border-b border-gray-400 px-6">
    <ul class="flex -mb-px text-sm">
      <li class="mr-1"><a class="inline-block px-4 py-3 border-b-2 border-transparent text-gray-900 hover:text-gray-950 hover:border-gray-600 no-underline" href="pages.html">时间</a></li>
      <li class="mr-1"><a class="inline-block px-4 py-3 border-b-2 border-gray-950 text-gray-950 no-underline" href="#">分类</a></li>
    </ul>
  </div>
  <div class="px-6 py-6">
    <div class="space-y-6">
    {% for tag in site.tags reversed %}
    <h3 id="{{ tag[0] }}-ref" class="text-sm font-semibold text-gray-950">{{ tag[0] }}</h3>
    <ul class="list-disc list-inside space-y-1 text-sm text-gray-900 ml-2">
        {% for post in tag[1] %}
            <li><a class="text-link hover:underline no-underline" href="{{ post.url }}">{{ post.title }}</a></li>
        {% endfor %}
    </ul>
    {% endfor %}
    </div>
  </div>
</div>
